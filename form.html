<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Request a Quote | Adovasio Technology LLC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta
    name="description"
    content="Request a quote for secure infrastructure and managed services from Adovasio Technology LLC."
  />
  <link rel="icon" href="/assets/images/adovasio-round-icon.png" type="image/png" />
  <link rel="apple-touch-icon" href="/assets/images/adovasio-round-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1220;
      --bg-soft: #111827;
      --text: #e5e7eb;
      --muted: #a8b3c7;
      --line: rgba(148, 163, 184, 0.18);
      --accent: #2563eb;
      --accent-soft: #60a5fa;
      --shadow: 0 28px 80px rgba(2, 6, 23, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 0%, rgba(37, 99, 235, 0.28), transparent 32%),
        radial-gradient(circle at 88% 12%, rgba(96, 165, 250, 0.18), transparent 28%),
        linear-gradient(180deg, #020617 0%, #0b1220 42%, #111827 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      width: min(1120px, calc(100% - 24px));
      margin: 0 auto;
      padding: 20px 0 48px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 16px 18px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(11, 18, 32, 0.78);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      min-width: 0;
    }

    .brand-logo-shell {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      border-radius: 20px;
      background: rgba(248, 251, 255, 0.98);
      border: 1px solid rgba(191, 219, 254, 0.42);
      box-shadow: 0 12px 30px rgba(2, 6, 23, 0.2);
    }

    .brand-logo {
      display: block;
      width: clamp(230px, 28vw, 340px);
      height: auto;
      object-fit: contain;
    }

    .back-link {
      padding: 12px 16px;
      border-radius: 999px;
      border: 1px solid rgba(96, 165, 250, 0.28);
      background: rgba(37, 99, 235, 0.14);
      color: #eff6ff;
      font-weight: 700;
    }

    .page {
      display: grid;
      grid-template-columns: minmax(0, 0.86fr) minmax(0, 1.14fr);
      gap: 24px;
      margin-top: 24px;
    }

    .intro,
    .form-shell {
      border-radius: 32px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .intro {
      padding: 32px;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.96), rgba(11, 18, 32, 0.92));
    }

    .eyebrow {
      color: #93c5fd;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.78rem;
      font-weight: 800;
    }

    h1 {
      margin: 16px 0 0;
      font-size: clamp(2.2rem, 5vw, 4rem);
      line-height: 1;
      letter-spacing: -0.05em;
    }

    .intro p {
      margin: 18px 0 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .intro ul {
      margin: 24px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 14px;
    }

    .intro li {
      display: flex;
      gap: 12px;
      color: #e5eefc;
      line-height: 1.55;
    }

    .intro li::before {
      content: "";
      width: 10px;
      height: 10px;
      margin-top: 0.45rem;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), var(--accent-soft));
      flex: none;
    }

    .form-shell {
      padding: 18px;
      background: linear-gradient(180deg, rgba(248, 251, 255, 0.98), rgba(231, 238, 247, 0.94));
    }

    .form-frame {
      overflow: hidden;
      border-radius: 24px;
      background: #f8fbff;
      min-height: 720px;
    }

    @media (max-width: 860px) {
      .page {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .shell {
        width: min(1120px, calc(100% - 16px));
        padding-top: 12px;
      }

      .topbar {
        flex-wrap: wrap;
      }

      .brand,
      .brand-logo-shell,
      .brand-logo {
        width: 100%;
      }

      .back-link {
        width: 100%;
        text-align: center;
      }

      .intro,
      .form-shell {
        padding: 20px;
        border-radius: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <a class="brand" href="index.html">
        <span class="brand-logo-shell">
          <img
            class="brand-logo"
            src="/assets/images/adovasio-primary-logo.png"
            alt="Adovasio Technology LLC"
            width="1536"
            height="337"
          />
        </span>
      </a>
      <a class="back-link" href="index.html">Back to homepage</a>
    </header>

    <main class="page">
      <section class="intro">
        <p class="eyebrow">Request a Quote</p>
        <h1>Tell us what you need.</h1>
        <p>Remote access, private cloud, backup, monitoring, routers, or managed support.</p>
        <ul>
          <li>VPN, SSO, and secure access</li>
          <li>Cloud, backup, notes, print, and Git</li>
          <li>Remote routers and ongoing management</li>
        </ul>
      </section>

      <section class="form-shell">
        <div class="form-frame">
          <script
            type="text/javascript"
            data-origin="www.abcsubmit.com"
            src="//www.abcsubmit.com/embed/id_1jgb18ui0_efp/request-service.js"
            data-role="abcsubmit-form-embed"
            data-document-id="id_1jgb18ui0_efp"
            data-embed-params="utm=abcsubmit"
          ></script>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
